<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | Nutribite</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://plus.unsplash.com/premium_photo-1673108852141-e8c3c22a4a22?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
      background-size: cover;
      locking scrolling: hidden;
    }

    .container {
      width: 500px;
      margin: 80px auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin: 15px 0 5px;
      color: #444;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
    }

    button {
      width: 50%;
      padding: 10px;
      background-color: #28a745;
      color: #fff;
      border: none;
      border-radius: 6px;
      margin-top: 20px;
      cursor: pointer;
      button-align: center;
      font-weight: bold;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    a {
      display: block;
      margin-top: 15px;
      text-align: center;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>REGISTER</h1>
    <form action="/register" method="POST">
      <label>Name:</label>
      <input type="text" name="name" required>

      <label>Age:</label>
      <input type="number" name="age" required>

      <label>Gender:</label>
      <input type="text" name="Gender" required>

      <label>Mobile Number:</label>
      <input type="text" name="mobile" required>

      <label>Email:</label>
      <input type="email" name="email" required>

      <label>Password:</label>
      <input type="password" name="password" required>

      <button type="submit">Register</button>
    </form>
    <a href="/login">Already have an account? Login here</a>
  </div>
</body>
</html>
