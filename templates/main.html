<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome | Nutribite</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100%;
    }

    .hero {
      background-image: url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1740&q=80');

      background-size: cover;
      background-position: center;
      height: 100vh;
      color: white;
      position: relative;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px 60px;
      position: relative;
      z-index: 1;
    }
    

    nav .logo {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    nav .menu a {
      margin-left: 25px;
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    nav .menu a:hover {
      text-decoration: underline;
    }

    .content {
      position: relative;
      z-index: 1;
      top: 30%;
      text-align: center;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .content h1 {
      font-size: 48px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .content p {
      font-size: 18px;
      line-height: 1.6;
      color: #f1f1f1;
    }

    .cta-btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 30px;
      background-color: #00a896;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .cta-btn:hover {
      background-color: #007c72;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="overlay"></div>

    <nav>
      <div class="logo">|Nutribite|</div>
      <div class="menu">
        <a href="/">Home</a>
        <a href="/about">About Us</a>
        <a href="/services">Services</a>
        <a href="/contact">Contact</a>
        <a href="/register">Register</a>
      </div>
    </nav>

    <div class="content">
      <h1>WELCOME</h1>
      <p>
        Nutribite is your all-in-one assistant for health and nutrition. 
        Track calories, scan meals, check your BMI, build custom diet plans and more — 
        all at one place with ease and clarity.
      </p>
      <a href="/login" class="cta-btn">Start Now</a>
    </div>
  </div>

  <script>
    console.log("Main landing page loaded.");
  </script>
</body>
</html>
